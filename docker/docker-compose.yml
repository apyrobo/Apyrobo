# =============================================================================
# APYROBO Docker Compose — Production / Cloud Environment
#
# Quick start:
#   cp docker/.env.example docker/.env
#   docker compose -f docker/docker-compose.yml up -d
#
# With Redis:
#   docker compose -f docker/docker-compose.yml --profile redis up -d
#
# With Prometheus only:
#   docker compose -f docker/docker-compose.yml --profile monitoring up -d
#   → Prometheus UI: http://localhost:9090
#
# With full observability (Prometheus + Grafana):
#   docker compose -f docker/docker-compose.yml --profile observability up -d
#   → Grafana: http://localhost:3000  (admin / apyrobo)
#   → Prometheus: http://localhost:9090
#
# Scale workers:
#   docker compose -f docker/docker-compose.yml up -d --scale apyrobo-worker=4
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # REST API gateway
  # ---------------------------------------------------------------------------
  apyrobo-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runtime
    image: apyrobo:latest
    container_name: apyrobo-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APYROBO_API_KEY: ${APYROBO_API_KEY:-changeme}
      APYROBO_LOG_LEVEL: ${APYROBO_LOG_LEVEL:-INFO}
      APYROBO_REDIS_URL: ${APYROBO_REDIS_URL:-}
      APYROBO_AUDIT_DB: /app/data/audit/audit.db
    volumes:
      - audit_data:/app/data/audit
      - skill_data:/app/data/skills
    networks:
      - apyrobo-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      redis:
        condition: service_healthy
        required: false

  # ---------------------------------------------------------------------------
  # Skill executor workers (stateless — scale freely)
  # ---------------------------------------------------------------------------
  apyrobo-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runtime
    image: apyrobo:latest
    restart: unless-stopped
    deploy:
      replicas: 2
    environment:
      APYROBO_API_KEY: ${APYROBO_API_KEY:-changeme}
      APYROBO_LOG_LEVEL: ${APYROBO_LOG_LEVEL:-INFO}
      APYROBO_REDIS_URL: ${APYROBO_REDIS_URL:-}
      APYROBO_WORKER_MODE: "true"
    volumes:
      - skill_data:/app/data/skills
    networks:
      - apyrobo-net
    command: ["python", "-m", "apyrobo.cli", "worker"]

  # ---------------------------------------------------------------------------
  # Redis — optional state persistence (profile: redis)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: apyrobo-redis
    restart: unless-stopped
    profiles:
      - redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - apyrobo-net
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ---------------------------------------------------------------------------
  # Prometheus — metrics scraping (profile: monitoring)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: apyrobo-prometheus
    restart: unless-stopped
    profiles:
      - monitoring
      - observability
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - apyrobo-net
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"

  # ---------------------------------------------------------------------------
  # Grafana — dashboards (profile: observability)
  #
  # Provisioned automatically:
  #   datasource: Prometheus at http://prometheus:9090
  #   dashboard:  docker/grafana/provisioning/dashboards/apyrobo.json
  #
  # Open: http://localhost:3000  (admin / apyrobo)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.0
    container_name: apyrobo-grafana
    restart: unless-stopped
    profiles:
      - observability
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: apyrobo
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    networks:
      - apyrobo-net
    depends_on:
      - prometheus

  # ---------------------------------------------------------------------------
  # Integration test — profile: integration
  #
  # fake-robot: minimal ROS 2 node that simulates a TurtleBot4.
  # integration-test: runs pytest -m integration inside the same ROS domain.
  #
  # Both containers share ROS_DOMAIN_ID=42 and the ros2-test-net bridge.
  # FastDDS multicast discovery works on Linux Docker bridge networks.
  # If discovery fails (e.g. Docker Desktop on Mac), set network_mode: host
  # on both services and remove the networks: stanza from each.
  #
  # Run:
  #   docker compose -f docker/docker-compose.yml --profile integration \
  #       up --build --abort-on-container-exit
  # ---------------------------------------------------------------------------
  fake-robot:
    build:
      context: ..
      dockerfile: docker/Dockerfile.integration
    image: apyrobo-integration:latest
    container_name: apyrobo-fake-robot
    profiles:
      - integration
    networks:
      - ros2-test-net
    environment:
      ROS_DOMAIN_ID: "42"
    command:
      - python3
      - tests/integration/fake_turtlebot4.py
    healthcheck:
      # Receive one /odom message (proves the node is up and publishing).
      # ros2 topic hz does not support --once; use topic echo --once instead.
      # timeout 5 ensures the command doesn't hang if the node isn't up yet.
      test:
        - CMD
        - bash
        - -c
        - "source /opt/ros/humble/setup.bash && timeout 5 ros2 topic echo /odom --once > /dev/null 2>&1"
      interval: 10s
      timeout: 15s
      retries: 8
      start_period: 30s

  integration-test:
    build:
      context: ..
      dockerfile: docker/Dockerfile.integration
    image: apyrobo-integration:latest
    container_name: apyrobo-integration-test
    profiles:
      - integration
    networks:
      - ros2-test-net
    environment:
      ROS_DOMAIN_ID: "42"
      FAKE_ROBOT_EXTERNAL: "1"
    depends_on:
      fake-robot:
        condition: service_healthy
    command:
      - pytest
      - -m
      - integration
      - tests/integration/
      - -v
      - --tb=short

volumes:
  audit_data:
    driver: local
  skill_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  apyrobo-net:
    driver: bridge
  ros2-test-net:
    driver: bridge
