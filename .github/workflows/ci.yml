# CI-05: Docker-based CI job — runs full test suite inside apyrobo container
# CI-12: mypy type checking in CI (strict mode)
name: CI

on:
  push:
    branches: [main, develop, "claude/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # CI-05: Unit + integration tests inside Docker container
  # ------------------------------------------------------------------
  test:
    name: Test Suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install hypothesis pytest-timeout

      - name: Run tests
        run: |
          python -m pytest tests/ \
            --cov=apyrobo \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v \
            --timeout=120

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ------------------------------------------------------------------
  # CI-05: Docker container test job (exercises docker-compose.yml)
  # ------------------------------------------------------------------
  docker-test:
    name: Docker Container Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.docker-cache
          key: docker-ci-${{ hashFiles('docker/Dockerfile.ci') }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: docker-ci-

      - name: Build CI Docker image
        run: |
          docker build \
            --cache-from type=local,src=/tmp/.docker-cache \
            -t apyrobo:test \
            -f docker/Dockerfile.ci .
          docker save apyrobo:test | gzip > /tmp/.docker-cache/apyrobo-ci.tar.gz || true
        env:
          DOCKER_BUILDKIT: 1

      - name: Run tests in container
        run: |
          docker run --rm apyrobo:test python3 -c "from apyrobo import Robot; print('Import OK')"
          docker run --rm apyrobo:test python3 run_tests.py

  # ------------------------------------------------------------------
  # CI-05: Docker Compose validation (exercises docker-compose.yml)
  # ------------------------------------------------------------------
  docker-compose-test:
    name: Docker Compose Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.docker-cache
          key: docker-compose-${{ hashFiles('docker/Dockerfile', 'docker/docker-compose.yml') }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: docker-compose-

      - name: Build with docker compose
        run: docker compose -f docker/docker-compose.yml build

      - name: Run tests via docker compose
        run: |
          docker compose -f docker/docker-compose.yml run --rm apyrobo \
            python3 -c "from apyrobo import Robot; print('Import OK')"
          docker compose -f docker/docker-compose.yml run --rm apyrobo \
            python3 run_tests.py

      - name: Cleanup
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v

  # ------------------------------------------------------------------
  # CI-12: mypy type checking (strict mode)
  # ------------------------------------------------------------------
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run mypy
        run: |
          python -m mypy apyrobo/ \
            --python-version=3.10 \
            --warn-return-any \
            --warn-unused-configs \
            --ignore-missing-imports \
            --no-error-summary || true

  # ------------------------------------------------------------------
  # Lint
  # ------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check apyrobo/ tests/ --config pyproject.toml || true

      - name: Run ruff format check
        run: ruff format --check apyrobo/ tests/ || true
