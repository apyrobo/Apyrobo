apiVersion: apps/v1
kind: Deployment
metadata:
  name: apyrobo-api
  namespace: apyrobo
  labels:
    app.kubernetes.io/name: apyrobo
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: apyrobo-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: apyrobo-api
        app.kubernetes.io/name: apyrobo
        app.kubernetes.io/component: api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: apyrobo:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: apyrobo-config
            - secretRef:
                name: apyrobo-secret
          volumeMounts:
            - name: audit-data
              mountPath: /app/data/audit
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: audit-data
          persistentVolumeClaim:
            claimName: apyrobo-audit-pvc
