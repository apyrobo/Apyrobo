apiVersion: v1
kind: Service
metadata:
  name: apyrobo-api-internal
  namespace: apyrobo
  labels:
    app.kubernetes.io/name: apyrobo
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app: apyrobo-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
