apiVersion: v1
kind: Secret
metadata:
  name: apyrobo-secret
  namespace: apyrobo
  labels:
    app.kubernetes.io/name: apyrobo
    app.kubernetes.io/component: secret
type: Opaque
stringData:
  # Replace with a strong random value before deploying:
  #   kubectl create secret generic apyrobo-secret \
  #     --from-literal=APYROBO_API_KEY="$(openssl rand -hex 32)" \
  #     -n apyrobo --dry-run=client -o yaml | kubectl apply -f -
  APYROBO_API_KEY: "changeme"
  # Optional Redis password
  APYROBO_REDIS_URL: "redis://apyrobo-redis:6379/0"
